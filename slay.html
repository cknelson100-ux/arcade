<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a060e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Slay">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<title>SLAY — Spire Run</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Kreon:wght@500;700&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #0a060e;
  --paper:  #ebdcae;
  --parch:  #d4c089;
  --gold:   #d4a73e;
  --goldL:  #ffd96a;
  --red:    #a82828;
  --redL:   #ff6868;
  --blue:   #2a5e96;
  --blueL:  #6ab0ff;
  --green:  #386b3a;
  --greenL: #8be88e;
  --purple: #6a2a8a;
  --purpleL:#c898ff;
  --frame:  #2a1410;
  --bg1:    #1b0a1a;
  --bg2:    #07020a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
  background: #050108;
  color: var(--paper);
  font-family: 'Kreon', serif;
  user-select: none;
}
/* atmospheric backdrop layers */
.bg {
  position: fixed; inset: 0;
  pointer-events: none;
}
#bgScene {
  z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 35%, #421a4a 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 18% 80%, #4a1a28 0%, transparent 75%),
    radial-gradient(ellipse 60% 50% at 82% 75%, #1a2a5a 0%, transparent 75%),
    linear-gradient(180deg, #1a0a1e 0%, #060108 100%);
}
#bgGrain {
  z-index: 1;
  background-image:
    radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1.5px),
    radial-gradient(circle, rgba(0,0,0,0.18) 1px, transparent 1.5px);
  background-size: 14px 14px, 8px 8px;
}
#bgVignette {
  z-index: 2;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.7) 100%);
}

#app { position: relative; z-index: 5; width: 100vw; height: 100vh; overflow: hidden; }

/* ========== TOP HUD ========== */
#topHud {
  position: absolute; top: 0; left: 0; right: 0;
  height: 54px;
  background:
    linear-gradient(180deg, rgba(20,8,18,0.96) 0%, rgba(10,4,12,0.86) 100%);
  border-bottom: 3px solid #000;
  display: flex; align-items: center; gap: 22px;
  padding: 0 18px;
  z-index: 50;
  font-family: 'Cinzel', serif;
  font-size: 14px;
  letter-spacing: 1px;
}
#topHud .stat { display: flex; align-items: center; gap: 6px; }
#topHud .stat .val { color: var(--gold); font-size: 19px; text-shadow: 2px 2px 0 var(--ink); font-weight: 700; }
.hpBar {
  position: relative; width: 220px; height: 22px;
  background: #1a0808; border: 2px solid #000; border-radius: 3px;
  box-shadow: inset 0 0 0 1px #4a0a0a, 0 0 0 2px #2a0e0e;
}
.hpBar .fill {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, #ff7a7a 0%, #b03030 60%, #6a1818 100%);
  transition: width 0.5s cubic-bezier(.3,1,.3,1);
}
.hpBar .text {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif; font-size: 12px;
  color: #fff;
  text-shadow: 1px 1px 0 #000, -1px -1px 0 #000;
}
#topHud .ctrls { margin-left: auto; display: flex; gap: 6px; }
#topHud .ctrls button {
  background: #2a1530; color: var(--paper);
  border: 2px solid #000; border-radius: 3px;
  padding: 5px 10px;
  font-family: 'Cinzel', serif; font-size: 11px;
  letter-spacing: 1px; cursor: pointer;
  box-shadow: 0 2px 0 #000;
}
#topHud .ctrls button:hover { filter: brightness(1.2); }

/* ========== MAP ========== */
#mapScreen { position: absolute; inset: 54px 0 0 0; overflow-y: auto; z-index: 10; }
#mapScreen.hidden { display: none; }
#mapTitle {
  text-align: center;
  font-family: 'Uncial Antiqua', 'Cinzel', serif;
  font-size: 30px; letter-spacing: 4px;
  color: var(--gold);
  text-shadow: 3px 3px 0 #000, 0 0 22px rgba(212,167,62,0.4);
  padding: 18px 0 6px 0;
}
#mapWrap { position: relative; width: 100%; max-width: 600px; margin: 0 auto; padding-bottom: 60px; }
#mapSvg { position: absolute; top: 0; left: 0; pointer-events: none; }
.mapRow {
  position: relative; display: flex; justify-content: space-around;
  align-items: center; height: 84px; padding: 0 22px;
}
.mapNode {
  width: 64px; height: 64px;
  border: 3px solid #000;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: not-allowed;
  position: relative;
  box-shadow: 0 4px 0 #000, inset 0 3px 0 rgba(255,255,255,0.10);
  transition: transform 0.15s, filter 0.15s, box-shadow 0.15s;
  z-index: 5;
  filter: brightness(0.45) saturate(0.55);
  background: #1a0a1a;
}
.mapNode svg { width: 44px; height: 44px; filter: drop-shadow(0 2px 0 rgba(0,0,0,0.7)); }
.mapNode.available {
  cursor: pointer;
  filter: brightness(1);
  border-color: var(--gold);
  box-shadow: 0 4px 0 #000, 0 0 22px rgba(212,167,62,0.7);
  animation: nodePulse 1.8s ease-in-out infinite;
}
.mapNode.visited { filter: brightness(0.45) grayscale(0.4); border-color: #4a3a2a; }
.mapNode.current {
  filter: brightness(1.15);
  border-color: var(--goldL);
  background: linear-gradient(180deg, #4a2a1a 0%, #2a1410 100%);
  box-shadow: 0 4px 0 #000, 0 0 28px rgba(255,217,106,0.95);
}
.mapNode:hover.available { transform: translateY(-5px) scale(1.10); }
.mapNode.k-combat   { background: radial-gradient(circle at 35% 30%, #5a1a1a, #2a0808); }
.mapNode.k-elite    { background: radial-gradient(circle at 35% 30%, #8a1828, #2a0408); }
.mapNode.k-rest     { background: radial-gradient(circle at 35% 30%, #5a3a18, #1a1004); }
.mapNode.k-treasure { background: radial-gradient(circle at 35% 30%, #5a5a18, #1a1808); }
.mapNode.k-boss     {
  background: radial-gradient(circle at 35% 30%, #8a0828, #1a0410);
  width: 92px; height: 92px; border-color: var(--red);
}
.mapNode.k-boss svg { width: 62px; height: 62px; }
.mapNode.k-boss.available { border-color: var(--gold); }
@keyframes nodePulse {
  0%, 100% { box-shadow: 0 4px 0 #000, 0 0 18px rgba(212,167,62,0.7); }
  50%      { box-shadow: 0 4px 0 #000, 0 0 32px rgba(212,167,62,1); }
}

/* ========== COMBAT ========== */
#combatScreen {
  position: absolute; inset: 54px 0 0 0;
  z-index: 10;
  display: flex; flex-direction: column;
}
#combatScreen.hidden { display: none; }

/* Combat scene backdrop */
#sceneBg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 30%, rgba(255,180,100,0.06) 0%, transparent 65%),
    radial-gradient(ellipse 100% 50% at 50% 100%, rgba(0,0,0,0.55) 0%, transparent 60%),
    linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.45) 100%);
  pointer-events: none;
}
/* ground line */
#sceneBg::after {
  content: '';
  position: absolute;
  left: 0; right: 0;
  bottom: 250px;
  height: 5px;
  background: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.6) 20%, rgba(0,0,0,0.6) 80%, transparent 100%);
  filter: blur(2px);
}

#battle {
  position: relative;
  flex: 1;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 60px;
  padding: 20px 60px 60px 240px;
  z-index: 5;
}

/* Player */
.player {
  position: absolute;
  left: 80px;
  bottom: 70px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.player .sprite {
  width: 140px; height: 160px;
  filter: drop-shadow(0 6px 0 #000) drop-shadow(0 12px 16px rgba(0,0,0,0.7));
  transition: transform 0.15s;
}
.player.hit .sprite { animation: playerHit 0.4s; }
@keyframes playerHit {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(6px); }
  40% { transform: translateX(-6px); }
  60% { transform: translateX(4px); }
  80% { transform: translateX(-4px); }
}
.player .nm {
  font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1.5px;
  color: var(--paper); text-shadow: 2px 2px 0 #000;
}
.statusRow {
  display: flex; gap: 4px; flex-wrap: wrap; justify-content: center;
  margin-top: 4px; min-height: 22px;
}
.statBadge {
  background: var(--ink);
  border: 2px solid #000;
  border-radius: 3px;
  padding: 1px 6px;
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--paper);
  box-shadow: 0 2px 0 #000;
  display: inline-flex; align-items: center; gap: 3px;
}
.statBadge.str   { color: var(--greenL);  border-color: var(--green); }
.statBadge.vuln  { color: var(--purpleL); border-color: var(--purple); }
.statBadge.weak  { color: var(--redL);    border-color: var(--red); }
.statBadge.block { color: var(--blueL);   border-color: var(--blue); }

/* Enemy */
.enemy {
  position: relative;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer;
  transition: transform 0.15s;
}
.enemy.dead {
  opacity: 0; pointer-events: none;
  transition: opacity 0.6s, transform 0.6s;
  transform: translateY(70px) scale(0.55) rotate(18deg);
}
.enemy .intent {
  background: rgba(10,5,12,0.94);
  border: 3px solid var(--gold);
  border-radius: 4px;
  padding: 4px 10px;
  font-family: 'Cinzel', serif; font-size: 13px;
  letter-spacing: 1px;
  color: var(--paper);
  display: flex; align-items: center; gap: 5px;
  box-shadow: 0 3px 0 #000;
  text-shadow: 1px 1px 0 #000;
  white-space: nowrap;
}
.enemy .intent.atk    { border-color: var(--red);    color: var(--redL); }
.enemy .intent.def    { border-color: var(--blue);   color: var(--blueL); }
.enemy .intent.buff   { border-color: var(--green);  color: var(--greenL); }
.enemy .intent.debuff { border-color: var(--purple); color: var(--purpleL); }
.enemy .sprite {
  width: 160px; height: 160px;
  filter: drop-shadow(0 6px 0 #000) drop-shadow(0 12px 16px rgba(0,0,0,0.75));
  transition: transform 0.18s, filter 0.18s;
  margin-top: 2px;
}
.enemy.boss .sprite { width: 220px; height: 220px; }
.enemy.elite .sprite { width: 180px; height: 180px; }
.enemy.hit .sprite { animation: enemyHit 0.4s; }
@keyframes enemyHit {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-12px) rotate(-3deg); }
  40% { transform: translateX(12px)  rotate(3deg); }
  60% { transform: translateX(-8px); }
  80% { transform: translateX(8px); }
}
.enemy.targetable .sprite { filter: drop-shadow(0 0 22px var(--gold)) drop-shadow(0 6px 0 #000); }
.enemy:hover .sprite { transform: scale(1.06); }
.enemy .nm {
  font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 1px;
  text-shadow: 2px 2px 0 #000; margin-top: 2px;
}
.enemyHp {
  width: 160px; height: 16px;
  background: #1a0808;
  border: 2px solid #000; border-radius: 3px;
  position: relative;
}
.enemyHp .fill {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, #ff7a7a 0%, #b03030 60%, #6a1818 100%);
  transition: width 0.4s;
}
.enemyHp .txt {
  position: absolute; inset: 0;
  text-align: center;
  font-family: 'Cinzel', serif; font-size: 11px;
  color: #fff; line-height: 12px;
  text-shadow: 1px 1px 0 #000, -1px -1px 0 #000;
}

/* idle bob on creatures */
.idleBob { animation: idleBob 3.2s ease-in-out infinite; }
@keyframes idleBob {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-4px); }
}

/* float numbers */
.floatNum {
  position: fixed;
  font-family: 'Cinzel', serif; font-weight: 800;
  font-size: 38px;
  color: #fff;
  text-shadow: 3px 3px 0 #000, 0 0 12px var(--red);
  pointer-events: none; z-index: 200;
  animation: floatUp 1.1s ease-out forwards;
}
.floatNum.block { color: var(--blueL); text-shadow: 3px 3px 0 #000, 0 0 12px var(--blue); }
.floatNum.heal  { color: var(--greenL); text-shadow: 3px 3px 0 #000, 0 0 12px var(--green); }
@keyframes floatUp {
  0%   { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
  20%  { transform: translate(-50%, -12px) scale(1.5); opacity: 1; }
  100% { transform: translate(-50%, -100px) scale(1); opacity: 0; }
}

/* ========== HAND AREA ========== */
#handArea {
  position: relative; height: 240px;
  background:
    linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.7) 100%);
  border-top: 3px solid #000;
  z-index: 8;
}
#hand { position: absolute; inset: 0; pointer-events: none; }

/* Energy orb (jewel style) */
#energyOrb {
  position: absolute;
  bottom: 24px; left: 24px;
  width: 108px; height: 108px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 32% 28%, #b8f4ff 0%, #4cc8ff 28%, #1485c8 60%, #0c3a6a 100%);
  border: 5px solid #000;
  box-shadow:
    0 7px 0 #000,
    0 0 36px rgba(76,200,255,0.55),
    inset 0 4px 0 rgba(255,255,255,0.35),
    inset 0 -10px 18px rgba(0,0,0,0.5);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 60; pointer-events: auto;
  font-family: 'Cinzel', serif;
}
#energyOrb::before {
  content: ''; position: absolute;
  top: 14px; left: 22px; width: 30px; height: 16px;
  background: radial-gradient(ellipse at center, rgba(255,255,255,0.7), transparent);
  border-radius: 50%;
}
#energyOrb .num { font-size: 42px; color: #fff; text-shadow: 3px 3px 0 #000, 0 0 12px #5be0ff; line-height: 1; font-weight: 800; }
#energyOrb .max { font-size: 12px; color: rgba(255,255,255,0.9); text-shadow: 2px 2px 0 #000; margin-top: 2px; letter-spacing: 1px; }
#energyOrb.flash { animation: orbPulse 0.4s; }
@keyframes orbPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.14); } }

/* End turn button */
#endTurnBtn {
  position: absolute;
  bottom: 32px; right: 26px;
  background:
    radial-gradient(ellipse at 50% 0%, #f06060 0%, #c63030 35%, #6a1818 100%);
  color: #fff;
  border: 4px solid #000; border-radius: 10px;
  padding: 16px 28px;
  font-family: 'Cinzel', serif; font-size: 18px;
  letter-spacing: 2px; cursor: pointer;
  box-shadow: 0 7px 0 #000, inset 0 3px 0 rgba(255,255,255,0.25);
  text-shadow: 2px 2px 0 #000;
  z-index: 60;
  transition: transform 0.08s, box-shadow 0.08s;
}
#endTurnBtn:hover  { filter: brightness(1.15); transform: translateY(-2px); box-shadow: 0 9px 0 #000, inset 0 3px 0 rgba(255,255,255,0.25); }
#endTurnBtn:active { transform: translateY(3px); box-shadow: 0 4px 0 #000, inset 0 3px 0 rgba(255,255,255,0.25); }
#endTurnBtn:disabled { filter: grayscale(0.5) brightness(0.6); cursor: not-allowed; }

/* Piles (stacks of cards) */
.pile {
  position: absolute; bottom: 30px;
  width: 80px; height: 110px;
  border: 4px solid #000; border-radius: 7px;
  background:
    repeating-linear-gradient(45deg, #5a1a3a 0 6px, #2a0a1a 6px 12px);
  box-shadow: 0 6px 0 #000, inset 0 0 0 3px #d4a73e;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  z-index: 60; cursor: pointer;
  font-family: 'Cinzel', serif;
  transition: transform 0.08s;
  padding-bottom: 6px;
  text-align: center;
}
.pile::before {
  content: '✦';
  position: absolute;
  top: 10px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.5);
  font-size: 22px;
}
.pile:hover { transform: translateY(-3px); }
.pile .lbl { font-size: 10px; letter-spacing: 1px; color: var(--paper); opacity: 0.85; text-shadow: 1px 1px 0 #000; }
.pile .cnt { font-size: 26px; color: var(--gold); text-shadow: 2px 2px 0 #000; line-height: 1; font-weight: 800; }
#drawPile    { left: 156px; }
#discardPile { right: 170px; }

/* ========== CARDS ========== */
.card {
  position: absolute;
  bottom: 4px; left: 50%;
  width: 156px; height: 220px;
  border-radius: 10px;
  cursor: pointer; pointer-events: auto;
  transition: transform 0.20s cubic-bezier(.4,1.4,.5,1), filter 0.18s;
  transform-origin: bottom center;
  filter: drop-shadow(0 6px 0 #000) drop-shadow(0 10px 18px rgba(0,0,0,0.7));
}
.card .cardInner {
  width: 100%; height: 100%;
  border: 4px solid #000;
  border-radius: 8px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 60%),
    var(--cardBg, #2a1410);
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.06), inset 0 -30px 40px rgba(0,0,0,0.45);
}
/* per-type frame colors */
.card.t-attack { --cardBg: linear-gradient(180deg, #5a1a18 0%, #2a0808 100%); }
.card.t-skill  { --cardBg: linear-gradient(180deg, #1a2a5a 0%, #08102a 100%); }
.card.t-power  { --cardBg: linear-gradient(180deg, #4a1a5a 0%, #1a0828 100%); }
.card.t-status { --cardBg: linear-gradient(180deg, #1a1a1a 0%, #060606 100%); }

/* cost orb */
.card .cardCost {
  position: absolute;
  top: -10px; left: -10px;
  width: 34px; height: 34px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 32% 28%, #b8f4ff 0%, #4cc8ff 28%, #1485c8 60%, #0c3a6a 100%);
  border: 4px solid #000;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif; font-size: 18px;
  color: #fff; text-shadow: 1px 1px 0 #000; font-weight: 800;
  z-index: 5;
  box-shadow: 0 3px 0 #000, 0 0 14px rgba(76,200,255,0.45), inset 0 2px 0 rgba(255,255,255,0.4);
}
.card .cardCost.zero {
  background: radial-gradient(circle at 32% 28%, #d4f898 0%, #88c860 28%, #487820 60%, #1a3008 100%);
  box-shadow: 0 3px 0 #000, 0 0 14px rgba(140,200,90,0.45), inset 0 2px 0 rgba(255,255,255,0.4);
}

/* top name banner */
.card .cardName {
  position: relative;
  text-align: center;
  font-family: 'Cinzel', serif; font-weight: 700;
  font-size: 12px; letter-spacing: 0.5px;
  color: #fff;
  padding: 9px 18px 7px 18px;
  background:
    linear-gradient(180deg, #6a4818 0%, #3a2510 60%, #1a0e08 100%);
  border-bottom: 2px solid #000;
  text-shadow: 1px 1px 0 #000;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.15);
}
.card .cardName::before, .card .cardName::after {
  content: '◆';
  position: absolute;
  top: 50%; transform: translateY(-50%);
  color: var(--gold);
  font-size: 10px;
  text-shadow: 0 0 4px rgba(0,0,0,0.7);
}
.card .cardName::before { left: 6px; }
.card .cardName::after  { right: 6px; }

/* art window */
.card .cardArt {
  position: relative;
  height: 90px;
  background:
    radial-gradient(ellipse at center, rgba(255,255,255,0.05) 0%, transparent 65%),
    linear-gradient(180deg, #150a18 0%, #050208 100%);
  border-bottom: 2px solid #000;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.card .cardArt svg { width: 100%; height: 100%; }
/* inner art frame */
.card .cardArt::before {
  content: '';
  position: absolute;
  inset: 2px;
  border: 1px solid rgba(212,167,62,0.25);
  border-radius: 2px;
  pointer-events: none;
}

.card .cardType {
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 9px; letter-spacing: 2px;
  padding: 3px 0;
  background: linear-gradient(180deg, #2a1a30 0%, #0e0612 100%);
  border-bottom: 2px solid #000;
  color: var(--gold);
}
.card.t-attack .cardType { color: var(--redL); }
.card.t-skill  .cardType { color: var(--blueL); }
.card.t-power  .cardType { color: var(--purpleL); }
.card.t-status .cardType { color: #888; }

.card .cardDesc {
  flex: 1;
  padding: 7px 9px;
  font-family: 'Kreon', serif; font-size: 13px;
  color: var(--paper); line-height: 1.18;
  text-align: center;
}
.card .cardDesc .hl   { color: var(--goldL); font-weight: 700; }

#overlay {

// ============================================================
// SOUND

let audioCtx = null, audioUnlocked = false;
let muted = localStorage.getItem('slayMute') === '1';
function unlockAudio() {
  if (audioUnlocked) return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    g.gain.value = 0.0001;
    o.connect(g).connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.02);
    audioUnlocked = true;
  } catch(e) {}
}
['pointerdown','keydown','touchstart','click'].forEach(ev => document.addEventListener(ev, unlockAudio, { capture: true }));
function tone(f, d, t='square', v=0.18, dl=0) {
  if (muted || !audioCtx) return;
  const t0 = audioCtx.currentTime + dl;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = t; o.frequency.setValueAtTime(f, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(v, t0 + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + d);
  o.connect(g).connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + d + 0.02);
}
function noise(d, v=0.12, f=2000, dl=0) {
  if (muted || !audioCtx) return;
  const t0 = audioCtx.currentTime + dl;
  const len = Math.max(1, Math.floor(audioCtx.sampleRate * d));
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const da = buf.getChannelData(0);
  for (let i = 0; i < len; i++) da[i] = (Math.random()*2 - 1) * (1 - i/len);
  const s = audioCtx.createBufferSource(); s.buffer = buf;
  const fi = audioCtx.createBiquadFilter(); fi.type = 'bandpass'; fi.frequency.value = f;
  const g = audioCtx.createGain(); g.gain.value = v;
  s.connect(fi).connect(g).connect(audioCtx.destination);
  s.start(t0);
}
function sndBlock()    { tone(440, 0.06, 'triangle', 0.12); tone(660, 0.08, 'triangle', 0.10, 0.04); }

function randInt(a,b) { return a + Math.floor(Math.random()*(b-a+1)); }
function pickRand(a) { return a[Math.floor(Math.random()*a.length)]; }
function shuffle(a) { for (let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [a[i],a[j]]=[a[j],a[i]]; } return a; }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function atkDmg(base, mul=1) { let d=base+((P.str||0)*mul); if (P.weak>0) d=Math.floor(d*0.75); return d; }
function blkAmt(base) { return base; }
function calcDealt(base, target, mul=1) {
  let d = base + ((P.str||0)*mul);
  if (P.weak>0) d = Math.floor(d*0.75);
  if (target && target.vuln>0) d = Math.floor(d*1.5);
  return Math.max(0, d);
}
function calcEnemyDmg(e, base) {
  let d = base + (e.str||0);
  if (e.weak>0) d = Math.floor(d*0.75);
  if (P.vuln>0) d = Math.floor(d*1.5);
  return Math.max(0, d);

const MAP_ROWS = 15;
function generateMap() {
  const map = [];
  for (let r = 0; r < MAP_ROWS; r++) {
    const cnt = r === MAP_ROWS-1 ? 1 : 3 + (Math.random() < 0.4 ? 1 : 0);
    const row = [];
    for (let c = 0; c < cnt; c++) row.push({ r, c, kind:'combat', edges:[], visited:false });
    map.push(row);
  }
  for (let r = 0; r < MAP_ROWS; r++) {
    for (const n of map[r]) {
      if (r === MAP_ROWS-1) n.kind = 'boss';
      else if (r === 0) n.kind = 'combat';
      else if (r === MAP_ROWS-2) n.kind = 'rest';
      else if (r === 3 || r === 8) n.kind = Math.random() < 0.7 ? 'rest' : 'combat';
      else if (r === 6 || r === 11) n.kind = Math.random() < 0.55 ? 'elite' : 'combat';
      else if (r === 5) n.kind = Math.random() < 0.35 ? 'treasure' : 'combat';
      else n.kind = 'combat';
    }
  }
  for (let r = 0; r < MAP_ROWS-1; r++) {
    const cur = map[r], nxt = map[r+1];
    for (let ci = 0; ci < cur.length; ci++) {
      const node = cur[ci];
      const ratio = nxt.length / cur.length;
      const ideal = Math.round(ci * ratio);
      const range = [];
      for (let d=-1; d<=1; d++) { const t = ideal+d; if (t>=0 && t<nxt.length) range.push(t); }
      const picks = shuffle(range.slice()).slice(0, 1 + (Math.random()<0.45 && range.length>1 ? 1 : 0));
      for (const t of picks) if (!node.edges.includes(t)) node.edges.push(t);
    }
    for (let ci=0; ci<nxt.length; ci++) {
      if (!cur.some(n=>n.edges.includes(ci))) {
        let best=0, bestD=999;
        for (let i=0; i<cur.length; i++) { const d=Math.abs(i-ci); if (d<bestD) { bestD=d; best=i; } }
        if (!cur[best].edges.includes(ci)) cur[best].edges.push(ci);
      }
    }
  }
  return map;
}

function showMap() {
  P.screen = 'map';
  document.getElementById('combatScreen').classList.add('hidden');
  document.getElementById('mapScreen').classList.remove('hidden');
  renderMap();
  renderHud();
}

function renderMap() {
  const wrap = document.getElementById('mapRows');
  wrap.innerHTML = '';
  computeReachable();
  for (let r = MAP_ROWS-1; r >= 0; r--) {
    const rowEl = document.createElement('div');
    rowEl.className = 'mapRow';
    rowEl.dataset.row = r;
    for (let ci = 0; ci < P.map[r].length; ci++) {
      const node = P.map[r][ci];
      const el = document.createElement('div');
      el.className = 'mapNode k-' + node.kind;
      if (node.visited) el.classList.add('visited');
      const key = r + ':' + ci;
      if (P.currentNode && P.currentNode.r === r && P.currentNode.c === ci) el.classList.add('current');
      if (P.reachable.has(key)) el.classList.add('available');
      const iconMap = { combat:'icon_combat', elite:'icon_elite', rest:'icon_rest', treasure:'icon_treasure', boss:'icon_boss' };
      el.innerHTML = ART[iconMap[node.kind]] || '';
      el.title = node.kind.toUpperCase();
      el.dataset.r = r; el.dataset.c = ci;
      el.onclick = () => enterNode(r, ci);
      rowEl.appendChild(el);
    }
    wrap.appendChild(rowEl);
  }
  setTimeout(drawMapLines, 40);
}

function computeReachable() {
  P.reachable = new Set();
  if (!P.currentNode) {
    for (let ci = 0; ci < P.map[0].length; ci++) P.reachable.add('0:' + ci);
  } else {
    const cur = P.map[P.currentNode.r][P.currentNode.c];
    for (const ti of cur.edges) {
      const r2 = P.currentNode.r + 1;
      if (r2 < MAP_ROWS) P.reachable.add(r2 + ':' + ti);
    }
  }
}

function drawMapLines() {
  const wrap = document.getElementById('mapRows');
  const svg = document.getElementById('mapSvg');
  if (!wrap || !svg) return;
  const wr = wrap.getBoundingClientRect();
  svg.setAttribute('width', wr.width);
  svg.setAttribute('height', wrap.offsetHeight);
  svg.style.height = wrap.offsetHeight + 'px';
  svg.innerHTML = '';
  const nodes = wrap.querySelectorAll('.mapNode');
  const nm = {};
  nodes.forEach(n => { nm[n.dataset.r + ':' + n.dataset.c] = n; });
  for (let r = 0; r < MAP_ROWS - 1; r++) {
    for (let ci = 0; ci < P.map[r].length; ci++) {
      const node = P.map[r][ci];
      const fromEl = nm[r + ':' + ci];
      if (!fromEl) continue;
      const fr = fromEl.getBoundingClientRect();
      const fx = fr.left + fr.width/2 - wr.left;
      const fy = fr.top + fr.height/2 - wr.top;
      for (const ti of node.edges) {
        const toEl = nm[(r+1) + ':' + ti];
        if (!toEl) continue;
        const tr = toEl.getBoundingClientRect();
        const tx = tr.left + tr.width/2 - wr.left;
        const ty = tr.top + tr.height/2 - wr.top;
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', fx); line.setAttribute('y1', fy);
        line.setAttribute('x2', tx); line.setAttribute('y2', ty);
        const avail = P.reachable.has((r+1) + ':' + ti) && P.currentNode && P.currentNode.r === r && P.currentNode.c === ci;
        const vis = P.map[r][ci].visited && P.map[r+1][ti].visited;
        line.setAttribute('stroke', vis ? '#5a3a1a' : avail ? '#d4a73e' : '#3a2a3a');
        line.setAttribute('stroke-width', avail ? 4 : 3);
        line.setAttribute('stroke-dasharray', avail ? '7 4' : 'none');
        line.setAttribute('stroke-linecap', 'round');
        svg.appendChild(line);
      }
    }
  }
}

function enterNode(r, c) {
  const key = r + ':' + c;
  if (!P.reachable.has(key)) return;
  sndButton();
  P.map[r][c].visited = true;
  P.currentNode = { r, c };
  P.floor = r + 1;
  const node = P.map[r][c];
  switch (node.kind) {
    case 'combat':   beginCombat(makeCombat(r));  break;
    case 'elite':    beginCombat(makeElite(r));   break;
    case 'rest':     beginRest();                 break;
    case 'treasure': beginTreasure();             break;
    case 'boss':     beginCombat(makeBoss());     break;
    default:         beginCombat(makeCombat(r));
  }
}

function makeCombat(row) {
  if (row <= 2) {
    const r = Math.random();
    if (r < 0.4) return [makeEnemy('gnashmaw')];
    if (r < 0.7) return [makeEnemy('ooze_acid'), makeEnemy('ooze_spike')];
    return [makeEnemy('crawler_a'), makeEnemy('crawler_b')];
  }
  if (row <= 6) {
    const r = Math.random();
    if (r < 0.3) return [makeEnemy('hooded_one')];
    if (r < 0.55) return [makeEnemy('gnashmaw'), makeEnemy('hooded_one')];
    if (r < 0.8) return [makeEnemy('mushman'), makeEnemy('mushman')];
    return [makeEnemy('watcher_orb'), makeEnemy('watcher_orb')];
  }
  const r = Math.random();
  if (r < 0.3) return [makeEnemy('wing_drifter'), makeEnemy('wing_drifter')];
  if (r < 0.55) return [makeEnemy('hooded_one'), makeEnemy('mushman')];
  if (r < 0.8) return [makeEnemy('gnashmaw'), makeEnemy('gnashmaw')];
  return [makeEnemy('watcher_orb'), makeEnemy('watcher_orb')];
}
function makeElite(row) { return [makeEnemy(pickRand(['brute','slumberer']))]; }
function makeBoss() { return [makeEnemy(pickRand(['great_ooze','hex_eye','warden']))]; }

// ============================================================
// COMBAT
// ============================================================
function beginCombat(enemies) {
  P.screen = 'combat';
  P.enemies = enemies;
  P.energy = P.energyMax;
  P.block = 0; P.str = 0; P.vuln = 0; P.weak = 0;
  P.tempStr = 0; P.metallicize = 0; P.noDraw = false;
  P.draw = shuffle([...P.deck]);
  P.hand = []; P.discard = []; P.exhaust = [];
  P.turn = 0; P.busy = false; P.inCombat = true;
  targetingIdx = -1;
  for (const e of P.enemies) e.intent = e.ai(e, 0);
  document.getElementById('mapScreen').classList.add('hidden');
  document.getElementById('combatScreen').classList.remove('hidden');
  drawCards(5);
  renderAll();
}

function drawCards(n) {
  if (P.noDraw && n > 0) return;
  for (let i = 0; i < n; i++) {
    if (P.draw.length === 0) {
      if (P.discard.length === 0) break;
      P.draw = shuffle(P.discard);
      P.discard = [];
    }
    if (P.hand.length >= 10) break;
    P.hand.push(P.draw.pop());
    sndCardDraw();
  }
  renderHand(); renderPiles();
}

function gainBlock(n) {
  P.block += n;
  sndBlock();
  const r = playerRect();
  floatNum(r.cx, r.cy - 30, '+' + n, 'block');
  renderAll();
}
function takeRawDmg(n) {
  P.hp = Math.max(0, P.hp - n);
  if (P.hp === 0) defeat();
}
function dealAttack(target, base, mul=1) {
  if (!target || target.dead) return;
  let dmg = calcDealt(base, target, mul);
  const toBlock = Math.min(target.block, dmg);
  target.block -= toBlock;
  const toHp = dmg - toBlock;
  if (toHp > 0) target.hp = Math.max(0, target.hp - toHp);
  sndEnemyHit();
  hitEnemy(target, dmg);
  if (target.hp <= 0 && !target.dead) {
    target.dead = true;
    sndEnemyDie();
    setTimeout(checkVictory, 600);
  }
  renderAll();
}
function applyEnemyStatus(target, key, amount) {
  if (!target || target.dead) return;
  target[key] = (target[key] || 0) + amount;
  sndStatus();
  renderAll();
}

let targetingIdx = -1;
let targetingMouse = { x:0, y:0 };
let targetingStart = { x:0, y:0 };
function aoeCard(c) { return ['cleave','thunder','immolate'].includes(c.id); }

function tryPlayCard(idx) {
  if (P.busy) return;
  const c = P.hand[idx];
  if (!c) return;
  if (c.unplayable) return;
  if (P.energy < c.cost) return;
  if (c.type === 'attack' && !aoeCard(c)) {
    const alive = P.enemies.filter(e => !e.dead);
    if (alive.length === 1) { executeCard(idx, alive[0]); return; }
    enterTargeting(idx);
  } else {
    executeCard(idx, null);
  }
}

function enterTargeting(idx) {
  targetingIdx = idx;
  const cards = document.querySelectorAll('#hand .card');
  if (cards[idx]) {
    const r = cards[idx].getBoundingClientRect();
    targetingStart = { x: r.left + r.width/2, y: r.top + r.height/2 };
  }
  document.querySelectorAll('.enemy').forEach(el => el.classList.add('targetable'));
  renderHand();
  document.addEventListener('mousemove', onTargetingMove);
  document.addEventListener('click', onTargetingClick, { capture: true });
  document.addEventListener('keydown', onTargetingKey);
  document.getElementById('targetArrow').classList.add('go');
}
function onTargetingMove(e) {
  targetingMouse.x = e.clientX; targetingMouse.y = e.clientY;
  drawTargetArrow();
}
function onTargetingClick(e) {
  const enEl = e.target.closest && e.target.closest('.enemy');
  if (enEl) {
    const i = Number(enEl.dataset.idx);
    const t = P.enemies[i];
    if (t && !t.dead) {
      const cardIdx = targetingIdx;
      exitTargeting();
      executeCard(cardIdx, t);
      e.stopPropagation(); e.preventDefault();
      return;
    }
  }
  exitTargeting();
}
function onTargetingKey(e) { if (e.code === 'Escape') exitTargeting(); }
function exitTargeting() {
  targetingIdx = -1;
  document.querySelectorAll('.enemy').forEach(el => el.classList.remove('targetable'));
  document.removeEventListener('mousemove', onTargetingMove);
  document.removeEventListener('click', onTargetingClick, { capture: true });
  document.removeEventListener('keydown', onTargetingKey);
  document.getElementById('targetArrow').classList.remove('go');
  renderHand();
}
function drawTargetArrow() {
  const svg = document.getElementById('targetArrow');
  if (!svg.classList.contains('go')) return;
  const x1=targetingStart.x, y1=targetingStart.y, x2=targetingMouse.x, y2=targetingMouse.y;
  const minX=Math.min(x1,x2)-14, minY=Math.min(y1,y2)-14;
  const w=Math.abs(x2-x1)+28, h=Math.abs(y2-y1)+28;
  svg.style.left=minX+'px'; svg.style.top=minY+'px';
  svg.setAttribute('width',w); svg.setAttribute('height',h);
  const X1=x1-minX, Y1=y1-minY, X2=x2-minX, Y2=y2-minY;
  svg.innerHTML = `<defs><marker id="ar" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto"><path d="M0,0 L8,5 L0,10 z" fill="#ffd96a"/></marker></defs><line x1="${X1}" y1="${Y1}" x2="${X2}" y2="${Y2}" stroke="#ffd96a" stroke-width="4" stroke-dasharray="8 5" marker-end="url(#ar)"/>`;
}

function executeCard(idx, target) {
  const c = P.hand[idx];
  if (!c) return;
  if (P.energy < c.cost) return;
  P.energy -= c.cost;
  P.hand.splice(idx, 1);
  sndCardPlay();
  pulseEnergy();
  c.play(target);
  if (c.type === 'power' || c.ethereal) P.exhaust.push(c);
  else P.discard.push(c);
  renderAll();
}

function endTurn() {
  if (P.busy || !P.inCombat) return;
  if (targetingIdx >= 0) exitTargeting();
  P.busy = true;
  for (let i = P.hand.length - 1; i >= 0; i--) {
    if (P.hand[i].ethereal) { P.exhaust.push(P.hand[i]); P.hand.splice(i, 1); }
  }
  let burnCount = 0;
  for (const c of P.hand) if (c.id === 'burn') burnCount++;
  if (burnCount > 0) applyDamageToPlayer(2 * burnCount, true);
  if (P.metallicize > 0) gainBlock(P.metallicize);
  if (P.tempStr) { P.str -= P.tempStr; P.tempStr = 0; }
  while (P.hand.length) P.discard.push(P.hand.shift());
  renderAll();
  setTimeout(enemyTurn, 380);
}

async function enemyTurn() {
  for (const e of P.enemies) {
    if (e.dead) continue;
    await sleep(420);
    await runIntent(e);
    if (P.hp <= 0) return;
  }
  P.turn++;
  for (const e of P.enemies) {
    if (e.dead) continue;
    e.turn++; e.block = 0;
    e.intent = e.ai(e, e.turn);
    if (e.vuln > 0) e.vuln--;
    if (e.weak > 0) e.weak--;
  }
  P.block = 0;
  if (P.vuln > 0) P.vuln--;
  if (P.weak > 0) P.weak--;
  P.energy = P.energyMax;
  P.noDraw = false;
  drawCards(5);
  P.busy = false;
  renderAll();
}

async function runIntent(e) {
  const I = e.intent; if (!I) return;
  const seat = enemyEl(e);
  if (seat) { seat.classList.add('hit'); setTimeout(()=>seat.classList.remove('hit'), 400); }
  if (I.kind === 'atk' || I.kind === 'atk_def') {
    const hits = I.hits || 1;
    for (let i = 0; i < hits; i++) {
      if (i > 0) await sleep(250);
      applyDamageToPlayer(calcEnemyDmg(e, I.dmg));
      if (P.hp <= 0) return;
    }
    if (I.kind === 'atk_def') e.block += I.block;
  } else if (I.kind === 'def') {
    e.block += I.block; sndBlock();
  } else if (I.kind === 'buff_def') {
    e.str += I.str; e.block += I.block; sndStatus();
  } else if (I.kind === 'buff') {
    e.str += I.str; sndStatus();
  } else if (I.kind === 'debuff') {
    if (I.vuln) P.vuln += I.vuln;
    if (I.weak) P.weak += I.weak;
    if (I.dmg) applyDamageToPlayer(calcEnemyDmg(e, I.dmg));
    sndStatus();
  }
  renderAll();
}

function applyDamageToPlayer(n, silent=false) {
  const toBlock = Math.min(P.block, n);
  P.block -= toBlock;
  const remaining = n - toBlock;
  if (remaining > 0) {
    P.hp = Math.max(0, P.hp - remaining);
    if (!silent) { flashHit(); shakeBattle(); sndPlayerHit(); }
    const r = playerRect();
    floatNum(r.cx, r.cy - 30, n, 'damage');
  } else if (!silent) {
    sndBlock();
    const r = playerRect();
    floatNum(r.cx, r.cy - 30, '🛡 ' + n, 'block');
  }
  renderAll();
  if (P.hp <= 0) defeat();
}

// ============================================================
// END OF COMBAT
// ============================================================
function checkVictory() {
  if (!P.inCombat) return;
  if (P.enemies.every(e => e.dead)) {
    P.inCombat = false;
    sndVictory();
    const gold = randInt(10, 22) + Math.floor(P.floor * 1.2);
    P.gold += gold;
    const node = P.map[P.currentNode.r][P.currentNode.c];
    showVictory(gold, node.kind === 'boss', node.kind === 'elite');
  }
}

function showVictory(gold, isBoss, isElite) {
  const tier = isBoss ? 'boss' : isElite ? 'elite' : 'normal';
  const choices = pickRewardCards(3, tier);
  let html = `<h2>${isBoss ? 'The Spire Is Yours' : 'Victory'}</h2>
              <div class="desc">+${gold} gold${isBoss ? ' · Run complete' : ''}</div>`;
  if (isBoss) html += `<button class="btn gold" onclick="newRun()">NEW RUN</button>`;
  else html += `<div class="desc">Add 1 card to your deck:</div>
                <div class="cardRow" id="rewardRow"></div>
                <div style="display:flex;gap:10px;justify-content:center;">
                  <button class="btn ghost" onclick="skipReward()">SKIP (heal +6)</button>
                  <button class="btn gold"  onclick="continueWithoutCard()">CONTINUE</button>
                </div>`;
  document.getElementById('overlayBox').innerHTML = html;
  document.getElementById('overlay').classList.remove('hidden');
  if (!isBoss) {
    const row = document.getElementById('rewardRow');
    for (const c of choices) {
      const el = renderCard(c);
      el.classList.add('playable');
      el.onclick = () => takeReward(c);
      row.appendChild(el);
    }
  }
}

function pickRewardCards(n, tier='normal') {
  let pool;
  if (tier === 'boss')      pool = [...RARE_POOL, ...RARE_POOL, ...UNCOMMON_POOL];
  else if (tier === 'elite')pool = [...UNCOMMON_POOL, ...UNCOMMON_POOL, ...RARE_POOL];
  else                      pool = [...COMMON_POOL, ...COMMON_POOL, ...UNCOMMON_POOL];
  const picks = [], used = new Set();
  while (picks.length < n) {
    const id = pickRand(pool);
    if (used.has(id)) continue;
    used.add(id);
    picks.push(makeCard(id));
  }
  return picks;
}
function takeReward(c) { P.deck.push(c); sndCardDraw(); closeOverlay(); showMap(); }
function skipReward() { P.hp = Math.min(P.hpMax, P.hp + 6); sndStatus(); closeOverlay(); showMap(); }
function continueWithoutCard() { sndButton(); closeOverlay(); showMap(); }

function beginRest() {
  document.getElementById('combatScreen').classList.add('hidden');
  const heal = Math.floor(P.hpMax * 0.30);
  document.getElementById('overlayBox').innerHTML = `
    <h2>Rest Site</h2>
    <div style="font-size:80px;margin:4px 0">🔥</div>
    <div class="desc">A warm fire crackles. Choose one.</div>
    <div style="display:flex;gap:12px;justify-content:center;margin-top:12px;flex-wrap:wrap;">
      <button class="btn green" onclick="restHeal(${heal})">REST (+${heal} HP)</button>
      <button class="btn gold"  onclick="restSkip()">SKIP</button>
    </div>`;
  document.getElementById('overlay').classList.remove('hidden');
  renderHud();
}
function restHeal(n) { P.hp = Math.min(P.hpMax, P.hp + n); sndStatus(); closeOverlay(); showMap(); }
function restSkip() { sndButton(); closeOverlay(); showMap(); }

function beginTreasure() {
  document.getElementById('combatScreen').classList.add('hidden');
  const gold = randInt(35, 65);
  const heal = Math.random() < 0.5 ? 10 : 0;
  P.gold += gold;
  if (heal) P.hp = Math.min(P.hpMax, P.hp + heal);
  document.getElementById('overlayBox').innerHTML = `
    <h2>Treasure</h2>
    <div style="font-size:80px;margin:4px 0">💎</div>
    <div class="desc">The chest yields its prize.</div>
    <div class="desc">+${gold} gold${heal ? `<br>+${heal} HP` : ''}</div>
    <button class="btn gold" onclick="closeOverlay(); showMap();">CONTINUE</button>`;
  document.getElementById('overlay').classList.remove('hidden');
  renderHud();
}

function defeat() {
  if (!P.inCombat) return;
  P.inCombat = false;
  sndDefeat();
  setTimeout(() => {
    document.getElementById('overlayBox').innerHTML = `
      <h2>You Died</h2>
      <div class="desc">You fell on floor ${P.floor}.<br>Gold collected: ${P.gold}</div>
      <button class="btn gold" onclick="newRun()">NEW RUN</button>`;
    document.getElementById('overlay').classList.remove('hidden');
  }, 700);
}

function newRun() {
  closeOverlay();
  P.hp = 80; P.hpMax = 80;
  P.energy = 3; P.energyMax = 3;
  P.gold = 0;
  P.block = 0; P.str = 0; P.vuln = 0; P.weak = 0;
  P.tempStr = 0; P.metallicize = 0; P.noDraw = false;
  P.deck = startingDeck();
  P.draw = []; P.hand = []; P.discard = []; P.exhaust = [];
  P.enemies = []; P.floor = 0;
  P.busy = false; P.inCombat = false;
  P.currentNode = null;
  P.map = generateMap();
  showMap();
}
function confirmRestart() {
  document.getElementById('overlayBox').innerHTML = `
    <h2>Restart Run?</h2>
    <div class="desc">All progress will be lost.</div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn ghost" onclick="closeOverlay()">CANCEL</button>
      <button class="btn gold"  onclick="newRun()">YES, RESTART</button>
    </div>`;
  document.getElementById('overlay').classList.remove('hidden');
}
function closeOverlay() { document.getElementById('overlay').classList.add('hidden'); }

// ============================================================
// RENDER
// ============================================================
function renderAll() { renderHud(); renderBattle(); renderHand(); renderPiles(); }

function renderHud() {
  document.getElementById('floorNum').textContent = P.floor;
  document.getElementById('hpFill').style.width = (100 * P.hp / P.hpMax) + '%';
  document.getElementById('hpText').textContent = `${P.hp} / ${P.hpMax}`;
  document.getElementById('goldDisp').textContent = P.gold;
  const e = document.getElementById('energyVal'); if (e) e.textContent = P.energy;
  const m = document.getElementById('energyMax'); if (m) m.textContent = P.energyMax;
}

function renderBattle() {
  const b = document.getElementById('battle');
  b.innerHTML = '';
  const player = document.createElement('div');
  player.className = 'player';
  player.id = 'playerSeat';
  player.innerHTML = `<div class="sprite idleBob">${ART.player}</div><div class="nm">KNIGHT</div><div class="statusRow" id="playerStatuses"></div>`;
  b.appendChild(player);
  const ps = player.querySelector('#playerStatuses');
  if (P.block > 0) ps.appendChild(badge('block', '🛡 ' + P.block));
  if (P.str > 0)   ps.appendChild(badge('str',   '↑ ' + P.str));
  if (P.vuln > 0)  ps.appendChild(badge('vuln',  '☠ ' + P.vuln));
  if (P.weak > 0)  ps.appendChild(badge('weak',  '↓ ' + P.weak));

  for (let i = 0; i < P.enemies.length; i++) {
    const e = P.enemies[i];
    const wrap = document.createElement('div');
    wrap.className = 'enemy';
    if (e.dead)    wrap.classList.add('dead');
    if (e.isBoss)  wrap.classList.add('boss');
    if (e.isElite) wrap.classList.add('elite');
    wrap.dataset.idx = i;

    if (!e.dead && e.intent) {
      const it = document.createElement('div');
      const I = e.intent;
      let cls = 'intent ', txt = '';
      if (I.kind === 'atk' || I.kind === 'atk_def') { cls += 'atk'; const d = calcEnemyDmg(e, I.dmg); txt = `⚔ ${d}${I.hits ? '×' + I.hits : ''}`; }
      else if (I.kind === 'def') { cls += 'def'; txt = `🛡 +${I.block}`; }
      else if (I.kind === 'buff') { cls += 'buff'; txt = `↑ STR+${I.str}`; }
      else if (I.kind === 'buff_def') { cls += 'buff'; txt = `🛡 +${I.block} · STR+${I.str}`; }
      else if (I.kind === 'debuff') { cls += 'debuff'; txt = `☠ ${I.label}`; if (I.dmg) txt = `⚔ ${calcEnemyDmg(e, I.dmg)} · ${I.label}`; }
      it.className = cls; it.innerHTML = txt;
      wrap.appendChild(it);
    } else if (!e.dead) {
      const sp = document.createElement('div'); sp.style.height = '26px';
      wrap.appendChild(sp);
    }
    const sp = document.createElement('div'); sp.className = 'sprite idleBob';
    sp.innerHTML = ART[e.art] || '';
    wrap.appendChild(sp);
    const nm = document.createElement('div'); nm.className = 'nm';
    nm.textContent = e.name + (e.isElite ? ' ★' : '') + (e.isBoss ? ' 👑' : '');
    wrap.appendChild(nm);
    const hp = document.createElement('div'); hp.className = 'enemyHp';
    hp.innerHTML = `<div class="fill" style="width:${100*e.hp/e.hpMax}%"></div><div class="txt">${e.hp} / ${e.hpMax}</div>`;
    wrap.appendChild(hp);
    const st = document.createElement('div'); st.className = 'statusRow';
    if (e.block > 0) st.appendChild(badge('block', '🛡 ' + e.block));
    if (e.str > 0)   st.appendChild(badge('str',   '↑ ' + e.str));
    if (e.vuln > 0)  st.appendChild(badge('vuln',  '☠ ' + e.vuln));
    if (e.weak > 0)  st.appendChild(badge('weak',  '↓ ' + e.weak));
    wrap.appendChild(st);
    b.appendChild(wrap);
  }
}
function badge(cls, txt) { const b = document.createElement('span'); b.className = 'statBadge ' + cls; b.textContent = txt; return b; }
function enemyEl(e) { const i = P.enemies.indexOf(e); return document.querySelectorAll('.enemy')[i] || null; }

function renderHand() {
  const h = document.getElementById('hand');
  h.innerHTML = '';
  const n = P.hand.length;
  const wrapW = h.clientWidth || 900;
  const mid = (n - 1) / 2;
  const baseY = 30;
  for (let i = 0; i < n; i++) {
    const c = P.hand[i];
    const el = renderCard(c);
    const off = i - mid;
    const spread = Math.min(160, (wrapW * 0.55) / Math.max(1, n));
    const tx = off * spread;
    const rot = off * 4.5;
    const ty = -baseY - Math.abs(off) * 6;
    el.style.setProperty('--tx', tx + 'px');
    el.style.setProperty('--ty', ty + 'px');
    el.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
    const canPlay = P.inCombat && !P.busy && !c.unplayable && P.energy >= c.cost;
    if (canPlay) { el.classList.add('playable'); el.addEventListener('mouseenter', sndHover); }
    else el.classList.add('unplayable');
    if (targetingIdx === i) { el.classList.remove('playable'); el.classList.add('targeting'); }
    el.addEventListener('click', (ev) => { if (targetingIdx >= 0) return; tryPlayCard(i); ev.stopPropagation(); });
    h.appendChild(el);
  }
}
function renderCard(c) {
  const el = document.createElement('div');
  el.className = 'card t-' + c.type;
  el.innerHTML = `
    <div class="cardInner">
      <div class="cardCost ${c.cost === 0 ? 'zero' : ''}">${c.cost}</div>
      <div class="cardName">${c.name}</div>
      <div class="cardArt">${ART[c.art] || ''}</div>
      <div class="cardType">${c.type.toUpperCase()}</div>
      <div class="cardDesc">${c.desc(c)}</div>
    </div>`;
  return el;
}

function renderPiles() {
  document.getElementById('drawCount').textContent    = P.draw.length;
  document.getElementById('discardCount').textContent = P.discard.length;
}

function showPile(kind) {
  const list = kind === 'draw' ? shuffle([...P.draw]) : kind === 'discard' ? [...P.discard] : [...P.exhaust];
  document.getElementById('overlayBox').innerHTML = `<h2>${kind.toUpperCase()} (${list.length})</h2>
    <div class="pileList">${list.length ? '' : '<div style="color:#888;font-size:18px;margin:20px">empty</div>'}</div>
    <button class="btn ghost" onclick="closeOverlay()">CLOSE</button>`;
  const pl = document.querySelector('.pileList');
  for (const c of list) pl.appendChild(renderCard(c));
  document.getElementById('overlay').classList.remove('hidden');
}
function showDeck() {
  const list = [...P.deck].sort((a,b) => a.name.localeCompare(b.name));
  document.getElementById('overlayBox').innerHTML = `<h2>Deck (${list.length})</h2>
    <div class="pileList"></div>
    <button class="btn ghost" onclick="closeOverlay()">CLOSE</button>`;
  const pl = document.querySelector('.pileList');
  for (const c of list) pl.appendChild(renderCard(c));
  document.getElementById('overlay').classList.remove('hidden');
}

// FX
function flashHit() { const f = document.getElementById('hitFlash'); f.classList.remove('go'); void f.offsetWidth; f.classList.add('go'); }
function shakeBattle() { const b = document.getElementById('battle'); b.classList.remove('shake'); void b.offsetWidth; b.classList.add('shake'); }
function pulseEnergy() { const o = document.getElementById('energyOrb'); o.classList.remove('flash'); void o.offsetWidth; o.classList.add('flash'); }
function floatNum(x, y, val, kind='damage') {
  const el = document.createElement('div');
  el.className = 'floatNum ' + (kind === 'block' ? 'block' : kind === 'heal' ? 'heal' : '');
  el.textContent = val;
  el.style.left = x + 'px'; el.style.top = y + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}
function hitEnemy(e, dmg) {
  const el = enemyEl(e); if (!el) return;
  el.classList.remove('hit'); void el.offsetWidth; el.classList.add('hit');
  const r = el.getBoundingClientRect();
  floatNum(r.left + r.width/2, r.top + 30, dmg, 'damage');
  emitParticles(r.left + r.width/2, r.top + r.height/2, '#ff4060', 12);
}
function emitParticles(x, y, color, n=12) {
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'particle'; p.style.background = color;
    p.style.left = x + 'px'; p.style.top = y + 'px';
    p.style.boxShadow = `0 0 6px ${color}`;
    document.body.appendChild(p);
    const ang = Math.random()*Math.PI*2;
    const spd = 60 + Math.random()*120;
    const dx = Math.cos(ang)*spd, dy = Math.sin(ang)*spd - 30;
    p.animate([
      { transform: 'translate(0,0)', opacity: 1 },
      { transform: `translate(${dx}px, ${dy+60}px) scale(0.4)`, opacity: 0 },
    ], { duration: 700 + Math.random()*300, easing: 'cubic-bezier(.4,1,.6,1)' })
    .onfinish = () => p.remove();
  }
}
function playerRect() {
  const el = document.getElementById('playerSeat');
  if (!el) return { cx: 140, cy: 300 };
  const r = el.getBoundingClientRect();
  return { cx: r.left + r.width/2, cy: r.top + r.height/3 };
}

// INPUT
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); endTurn(); }
  else if (e.code === 'Escape') {
    if (targetingIdx >= 0) exitTargeting();
    else closeOverlay();
  }
  else {
    const n = parseInt(e.key, 10);
    if (!isNaN(n) && n >= 1 && n <= 9) {
      if (n - 1 < P.hand.length) tryPlayCard(n - 1);
    }
  }
});
window.addEventListener('resize', () => {
  if (P.screen === 'map') setTimeout(drawMapLines, 50);
  if (P.screen === 'combat') renderHand();
});

newRun();
</script>
