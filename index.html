<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a060e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arcade">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Kreon:wght@500;700&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    color: #f0e4be;
    font-family: 'Kreon', serif;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    background: #050108;
  }
  body {
    background:
      radial-gradient(ellipse 80% 60% at 50% 35%, #421a4a 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 18% 80%, #4a1a28 0%, transparent 75%),
      radial-gradient(ellipse 60% 50% at 82% 75%, #1a2a5a 0%, transparent 75%),
      linear-gradient(180deg, #1a0a1e 0%, #060108 100%);
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1.5px),
      radial-gradient(circle, rgba(0,0,0,0.18) 1px, transparent 1.5px);
    background-size: 14px 14px, 8px 8px;
    pointer-events: none;
    z-index: 1;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 2;
  }
  #wrap {
    position: relative; z-index: 5;
    width: 100vw; height: 100vh; height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 28px 18px;
    text-align: center;
  }
  h1 {
    font-family: 'Uncial Antiqua', 'Cinzel', serif;
    font-size: clamp(36px, 8vw, 64px);
    color: #ffd96a;
    letter-spacing: 4px;
    text-shadow: 4px 4px 0 #000, 0 0 28px rgba(212,167,62,0.5);
    margin-bottom: 6px;
  }
  .sub {
    font-family: 'Cinzel', serif;
    font-size: clamp(11px, 2.6vw, 14px);
    letter-spacing: 3px;
    color: #b8a878;
    text-shadow: 2px 2px 0 #000;
    margin-bottom: 36px;
    opacity: 0.85;
  }
  .menu {
    display: flex;
    flex-direction: column;
    gap: 18px;
    width: min(420px, 90vw);
  }
  .gameBtn {
    display: block;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(180deg, var(--c1) 0%, var(--c2) 100%);
    border: 4px solid #000;
    border-radius: 10px;
    padding: 18px 22px;
    box-shadow: 0 7px 0 #000, inset 0 3px 0 rgba(255,255,255,0.2);
    transition: transform 0.12s, box-shadow 0.12s, filter 0.15s;
    text-shadow: 2px 2px 0 #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .gameBtn:hover  { filter: brightness(1.15); transform: translateY(-3px); box-shadow: 0 10px 0 #000, inset 0 3px 0 rgba(255,255,255,0.2); }
  .gameBtn:active { transform: translateY(3px);  box-shadow: 0 4px 0 #000,  inset 0 3px 0 rgba(255,255,255,0.2); }
  .gameBtn.slay   { --c1: #a82828; --c2: #4a0810; }
  .gameBtn.euchre { --c1: #6a2a8a; --c2: #2a0c40; }
  .gameBtn .ico {
    width: 56px; height: 56px;
    flex-shrink: 0;
    filter: drop-shadow(0 3px 0 #000);
  }
  .gameBtn .txt { flex: 1; text-align: left; }
  .gameBtn .name {
    font-family: 'Cinzel', serif;
    font-size: clamp(20px, 5vw, 28px);
    font-weight: 800;
    letter-spacing: 2px;
    line-height: 1;
  }
  .gameBtn .desc {
    font-family: 'Kreon', serif;
    font-size: clamp(12px, 3vw, 14px);
    opacity: 0.85;
    margin-top: 4px;
    text-shadow: 1px 1px 0 #000;
  }
  .foot {
    margin-top: 32px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: #6a5a40;
    text-shadow: 1px 1px 0 #000;
  }
  .foot a { color: #b89868; text-decoration: none; }
</style>
</head>
<body>
<div id="wrap">
  <h1>ARCADE</h1>
  <div class="sub">PICK YOUR POISON</div>
  <div class="menu">
    <a class="gameBtn slay" href="slay.html">
      <svg class="ico" viewBox="0 0 120 160">
        <defs><linearGradient id="kn" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#a89a78"/><stop offset="55%" stop-color="#4a3a28"/><stop offset="100%" stop-color="#1a1408"/></linearGradient></defs>
        <path d="M40,55 L80,55 L86,124 L34,124 Z" fill="url(#kn)" stroke="#000" stroke-width="3"/>
        <path d="M42,28 Q60,8 78,28 L80,52 Q60,57 40,52 Z" fill="url(#kn)" stroke="#000" stroke-width="3"/>
        <rect x="48" y="36" width="24" height="4" fill="#000"/>
        <rect x="50" y="37" width="6" height="2" fill="#ff5028"/>
        <rect x="64" y="37" width="6" height="2" fill="#ff5028"/>
        <rect x="92" y="36" width="6" height="62" fill="#d8d0b8" stroke="#000" stroke-width="2"/>
      </svg>
      <div class="txt">
        <div class="name">SLAY</div>
        <div class="desc">Climb the spire. Build a deck. Don't die.</div>
      </div>
    </a>
    <a class="gameBtn euchre" href="euchre.html">
      <svg class="ico" viewBox="0 0 64 64">
        <rect x="6" y="10" width="40" height="50" rx="4" fill="#f4e8c1" stroke="#000" stroke-width="3" transform="rotate(-8 26 35)"/>
        <rect x="18" y="6"  width="40" height="50" rx="4" fill="#f4e8c1" stroke="#000" stroke-width="3" transform="rotate(8 38 31)"/>
        <text x="48" y="26" text-anchor="middle" font-family="serif" font-size="18" font-weight="800" fill="#c63a4a" transform="rotate(8 38 31)">A</text>
        <text x="52" y="44" text-anchor="middle" font-family="serif" font-size="22" fill="#c63a4a" transform="rotate(8 38 31)">♥</text>
      </svg>
      <div class="txt">
        <div class="name">EUCHRE</div>
        <div class="desc">Bid, partner up, take tricks. Stick the dealer.</div>
      </div>
    </a>
    <a class="gameBtn scrap" href="scrap.html" style="--c1:#d04040;--c2:#3a0810;">
      <svg class="ico" viewBox="0 0 64 64">
        <circle cx="22" cy="38" r="14" fill="#ff5060" stroke="#000" stroke-width="3"/>
        <rect x="14" y="29" width="16" height="3" fill="#000"/>
        <rect x="17" y="33" width="3" height="2" fill="#ffce4a"/>
        <rect x="24" y="33" width="3" height="2" fill="#ffce4a"/>
        <circle cx="46" cy="40" r="12" fill="#5aa9ff" stroke="#000" stroke-width="3"/>
        <rect x="40" y="33" width="12" height="2" fill="#000"/>
        <rect x="42" y="36" width="2" height="2" fill="#ffce4a"/>
        <rect x="48" y="36" width="2" height="2" fill="#ffce4a"/>
        <circle cx="34" cy="22" r="3" fill="#ffce4a" stroke="#000" stroke-width="2"/>
        <rect x="0" y="56" width="64" height="8" fill="#4a3a48" stroke="#000" stroke-width="2"/>
      </svg>
      <div class="txt">
        <div class="name">SCRAP</div>
        <div class="desc">2P arena brawler. Lose a round, draft a card. Best of 7.</div>
      </div>
    </a>
    <a class="gameBtn crucible" href="crucible.html" style="--c1:#4a9558;--c2:#0e3018;">
      <svg class="ico" viewBox="0 0 64 64">
        <rect x="8" y="8"  width="34" height="48" rx="4" fill="#c8e0ff" stroke="#000" stroke-width="3" transform="rotate(-10 25 32)"/>
        <rect x="14" y="6" width="34" height="48" rx="4" fill="#ffe2c0" stroke="#000" stroke-width="3" transform="rotate(2 31 30)"/>
        <rect x="22" y="10" width="34" height="48" rx="4" fill="#c8eecc" stroke="#000" stroke-width="3" transform="rotate(14 39 34)"/>
        <text x="42" y="38" text-anchor="middle" font-family="serif" font-size="20" font-weight="800" fill="#0e3018" transform="rotate(14 39 34)">7</text>
      </svg>
      <div class="txt">
        <div class="name">CRUCIBLE</div>
        <div class="desc">Shedding card duel, 2–6 players. Host or join online.</div>
      </div>
    </a>
  </div>
  <div class="foot">CKNELSON100 · 2026</div>
</div>
</body>
</html>
